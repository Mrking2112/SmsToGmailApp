name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK platform and build-tools
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Unzip source code (if a zip was uploaded)
        run: |
          ZIP_FILE=$(find "$GITHUB_WORKSPACE" -maxdepth 2 -iname "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "Zip mili: $ZIP_FILE — extract kar raha hoon"
            unzip -o "$ZIP_FILE" -d "$GITHUB_WORKSPACE"
          else
            echo "Koi zip nahi mili, source files pehle se hi extracted hain"
          fi

      - name: Find project folder and build debug APK
        run: |
          PROJECT_DIR=$(dirname "$(find "$GITHUB_WORKSPACE" -maxdepth 4 -name settings.gradle | head -n 1)")
          echo "Gradle project mila yahan: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle assembleDebug --stacktrace

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: '**/app-debug.apk'
          if-no-files-found: error
